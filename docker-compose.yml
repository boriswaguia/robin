services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: robin
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
      POSTGRES_DB: robin
    volumes:
      - pgdata:/var/lib/postgresql/data
    # No host port mapping — only accessible within the Docker network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U robin"]
      interval: 5s
      timeout: 5s
      retries: 5

  server:
    build: ./server
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://robin:${POSTGRES_PASSWORD}@db:5432/robin?schema=public
      GEMINI_API_KEY: ${GEMINI_API_KEY:?GEMINI_API_KEY is required}
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET is required}
      NODE_ENV: production
      PORT: 3001
    volumes:
      - uploads:/app/uploads
    # No host port mapping — API is only reachable via the Nginx reverse proxy

  client:
    build: ./client
    restart: unless-stopped
    depends_on:
      - server
    ports:
      - "80:80"

volumes:
  pgdata:
  uploads:
